<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌙睡眠模範生檢測｜德泰法蘭西床</title>
  <style>
    :root{
      --bg:#f4f1ea;
      --card:#ffffff;
      --text:#6f6256;
      --pink:#bca88f;
      --blue:#9c8f7d;
      --border:#f0ede5;
      --shadow:0 10px 40px rgba(163,177,198,.15);
      --soft:#fdfcf9;
      --soft2:#f9f9f9;

      /* 分享圖卡色塊（跟你的 banner 氣質一致） */
      --share-legend: rgba(235, 211, 156, 0.60);
      --share-good:   rgba(176, 205, 186, 0.60);
      --share-warn:   rgba(241, 186, 140, 0.62);
      --share-danger: rgba(224, 175, 180, 0.62);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      padding:20px;
      background:var(--bg);
      color:var(--text);
      font-family:'PingFang TC','Microsoft JhengHei',sans-serif;
      line-height:1.6;
    }
    .container{
      max-width:clamp(480px, 90%, 560px);
      margin:0 auto;
      background:var(--card);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:30px 22px;
    }
    h1{
      margin:0 0 10px 0;
      color:var(--pink);
      font-size:1.45rem;
      line-height:1.35;
      font-weight:800;
      text-align:center;
    }
    .subtitle{
      margin:0 0 14px 0;
      color:var(--blue);
      font-size:.95rem;
      font-weight:650;
      text-align:center;
    }
    .note{
      margin:0 0 20px 0;
      background:var(--soft2);
      border-radius:16px;
      padding:12px 14px;
      font-size:.9rem;
      line-height:1.7;
    }
    .note strong{ color:var(--text); }
    /* ⬇⬇⬇ 在這裡貼新的 CSS ⬇⬇⬇ */
    .note-title{
      font-weight:800;
      color:var(--text);
      margin-bottom:8px;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .note-list{
      margin:0;
      padding-left:18px;
      line-height:1.75;
    }
    .note-list li{
      margin:6px 0;
    }
    .note strong{
      font-weight:800;
    }
    /* ↑ 在這裡貼新的 CSS ↑ */

    .quiz-list{ margin:0 0 18px 0; padding:0; }
    .quiz-item{
      display:flex;
      align-items:flex-start;
      gap:14px;
      background:var(--soft);
      border:1px solid var(--border);
      padding:14px 16px;
      margin:0 0 12px 0;
      border-radius:16px;
      cursor:pointer;
      transition:transform .15s ease, border-color .15s ease, background-color .15s ease;
      user-select:none;
    }
    .quiz-item:hover{
      background:#fff;
      border-color:var(--pink);
      transform:translateY(-1px);
    }
    .quiz-item span{
      display:block;
      font-size:.98rem;
      line-height:1.45;
    }
    input[type="checkbox"]{
      margin-top:2px;
      transform:scale(1.15);
      accent-color:var(--pink);
      cursor:pointer;
      flex:0 0 auto;
    }
    .btn{
      width:100%;
      border:none;
      border-radius:999px;
      padding:15px 16px;
      font-size:1.05rem;
      font-weight:800;
      cursor:pointer;
      transition:transform .15s ease, filter .15s ease;
    }
    .btn-main{
      background:var(--pink);
      color:#fff;
      box-shadow:0 4px 12px rgba(224,175,180,.28);
    }
    .btn-main:hover{ transform:scale(1.01); filter:brightness(.98); }
    .btn-reset{
      margin-top:14px;
      background:var(--blue);
      color:#fff;
    }
    .btn-reset:hover{ transform:scale(1.01); filter:brightness(.97); }

    #result-box{ display:none; }
    .fade-in{ animation:fadeIn .45s ease; }
    @keyframes fadeIn{
      from{ opacity:0; transform:translateY(10px); }
      to{ opacity:1; transform:translateY(0); }
    }

    .banner{
      border-radius:18px;
      padding:14px 16px;
      margin:0 0 14px 0;
      text-align:center;
      font-weight:900;
      letter-spacing:.3px;
      background:linear-gradient(180deg, rgba(224,175,180,.22), rgba(163,177,198,.16));
    }
    /* ===== Banner 分數漸層色 ===== */
    .banner--legend{
      background: linear-gradient(
        135deg,
        rgba(235, 211, 156, 0.55),
        rgba(204, 173, 104, 0.35)
      );
    }
    .banner--good{
      background: linear-gradient(
        135deg,
        rgba(176, 205, 186, 0.55),
        rgba(129, 168, 148, 0.35)
      );
    }
    .banner--warn{
      background: linear-gradient(
        135deg,
        rgba(241, 186, 140, 0.55),
        rgba(215, 143, 95, 0.35)
      );
    }
    .banner--danger{
      background: linear-gradient(
        135deg,
        rgba(224, 175, 180, 0.65),
        rgba(193, 135, 143, 0.4)
      );
    }
    /* ===== Banner 分數漸層色 ===== */

    .banner .big{
      font-size:1.2rem;
      margin-bottom:4px;
    }
    .banner .small{
      font-size:1.05rem;
      font-weight:800;
      /*opacity:.9;*/
    }

    .score-title{
      text-align:center;
      font-size:1.02rem;
      font-weight:800;
      color:var(--blue);
      margin:8px 0 8px 0;
    }

    .meter{
      background:#efece4;
      border-radius:999px;
      height:14px;
      overflow:hidden;
      border:1px solid var(--border);
      margin:0 0 10px 0;
    }
    .meter > div{
      height:100%;
      width:0%;
      background:linear-gradient(
        90deg,
        #8c755f 0%,
        #a98f72 60%,
        #bda385 100%
      );
      transition:width .4s ease;
    }

    .score-line{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin:0 0 10px 0;
      font-weight:800;
    }
    .score-badge{
      padding:6px 12px;
      border-radius:999px;
      background:#efe7dd;
      border:1px solid #d8c8b6;
      color:#7f6e5c;
      font-size:.92rem;
      white-space:nowrap;
    }
    .score-detail{
      font-size:.92rem;
      opacity:.9;
      white-space:nowrap;
    }

    .feedback-text{
      background:var(--soft2);
      padding:18px 18px;
      border-radius:18px;
      font-size:1rem;
      line-height:1.85;
      margin:0 0 12px 0;
    }

    @media (max-width:420px){
      body{ padding:14px; }
      .container{ padding:24px 16px; border-radius:22px; }
      h1{ font-size:1.28rem; }
      .subtitle{ font-size:.9rem; }
      .quiz-item{ padding:12px 14px; }
    }

    /* LOGO的樣式 --*/
    .brand-footer{
      text-align:center;
      margin-top:12px;
      opacity:.6;
    }
    .brand-footer img{
      max-width:110px;
      height:auto;
    }
    /* LOGO的樣式 --*/

    /* ========== 分享功能（新增） ========== */
    .share-actions{
      display:flex;
      gap:10px;
      margin-top:10px;
    }
    .btn-share{
      flex:1;
      background:#efe7dd;
      border:1px solid #d8c8b6;
      color:#7f6e5c;
    }
    .btn-share:hover{ transform:scale(1.01); filter:brightness(.98); }

    /* Modal */
    .share-modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.35);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:9999;
    }
    .share-modal__panel{
      width:min(560px, 96vw);
      background:#fff;
      border-radius:18px;
      box-shadow:0 20px 60px rgba(0,0,0,.18);
      padding:14px;
    }
    .share-modal__preview{
      width:100%;
      border-radius:14px;
      overflow:hidden;
      background:#f4f1ea;
      border:1px solid #eee;
    }
    .share-modal__preview img{ width:100%; display:block; }
    .share-modal__btns{
      display:flex;
      gap:10px;
      margin-top:12px;
    }
    .share-modal__btns .btn{ padding:12px 14px; font-size:1rem; }
    .btn-secondary{
      background:#f6f2ec;
      border:1px solid #e7dfd4;
      color:#7f6e5c;
    }

    /* 隱藏的「結果圖卡」容器（用來截圖） */
    #share-card-wrap{
      position:fixed;
      left:-99999px;
      top:0;
      width:1080px;   /* IG 限動尺寸 */
      height:1920px;
      background:#f4f1ea;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:90px;
    }
    #share-card{
      width:100%;
      height:100%;
      border-radius:56px;
      background:rgba(255,255,255,.55);
      box-shadow:0 10px 40px rgba(163,177,198,.12);
      padding:120px 110px;
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      justify-content:center;
    }
    .share-emoji{
      font-size:110px;
      line-height:1;
      margin-bottom:28px;
    }
    .share-title{
      font-size:56px;
      font-weight:900;
      color:#6f6256;
      line-height:1.25;
      margin-bottom:70px;
      letter-spacing:.2px;
      max-width:860px;
    }
    .share-score-title{
      font-size:58px;
      font-weight:900;
      margin-bottom:30px;
      color:#6f6256;
    }
    .share-score{
      font-size:130px;
      font-weight:900;
      margin:10px 0 52px 0;
      color:#6f6256;
    }
    .share-label{
      font-size:54px;
      font-weight:900;
      margin-bottom:34px;
      color:#6f6256;
    }
    .share-subbox{
      width:100%;
      max-width:860px;
      padding:36px 36px;
      border-radius:28px;
      font-size:46px;
      font-weight:900;
      line-height:1.35;
      color:#6f6256;
      margin:18px 0 70px 0;
    }
    .share-cta{
      font-size:44px;
      font-weight:800;
      color:#6f6256;
      opacity:.85;
      margin-bottom:26px;
    }
    .share-qr{
      width:260px;
      height:260px;
      border-radius:20px;
      background:#fff;
      padding:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px solid rgba(0,0,0,.06);
      margin-bottom:70px;
    }
    .share-logo img{
      width:260px;
      height:auto;
      opacity:.85;
      display:block;
      margin:0 auto 12px auto;
    }
    .share-url{
      font-size:34px;
      opacity:.55;
      color:#6f6256;
      font-weight:700;
    }

    /* 依等級換色塊（不是整張背景） */
    #share-card.share--legend .share-subbox{ background: var(--share-legend); }
    #share-card.share--good   .share-subbox{ background: var(--share-good); }
    #share-card.share--warn   .share-subbox{ background: var(--share-warn); }
    #share-card.share--danger .share-subbox{ background: var(--share-danger); }
    /* ========== 分享功能（新增） ========== */
  </style>
</head>

<body>
  <div class="container">
    <div id="quiz-ui">
      <h1>🌙 你是「睡眠模範生」還是「夜貓進修生」？🎓</h1>
      <p class="subtitle">✨ 3/13 世界睡眠日 ✨<br>做個簡單的小測驗，檢視一下日常的睡眠狀況吧！</p>

      <div class="note">
        <ul class="note-list">
          <li><strong>作答方式：</strong>請依<strong>最近 2 週～1 個月</strong>的睡眠狀況勾選。</li>
          <li>本測驗為日常睡眠習慣自我檢視，非醫療評估用途。</li>
        </ul>
      </div>

      <div class="quiz-list">
        <label class="quiz-item"><input type="checkbox" class="q-check"><span>🕰️ 規律作息：每天固定時間起床（±1小時內）</span></label>
        <label class="quiz-item"><input type="checkbox" class="q-check"><span>☕ 避開刺激：下午 3 點後避免咖啡因（咖啡、濃茶、能量飲）</span></label>
        <label class="quiz-item"><input type="checkbox" class="q-check"><span>🍛 腸胃放鬆：睡前 2–3 小時不吃高油脂、高熱量或過飽</span></label>
        <label class="quiz-item"><input type="checkbox" class="q-check"><span>📱 數位斷食：睡前 30–60 分鐘不滑手機</span></label>
        <label class="quiz-item"><input type="checkbox" class="q-check"><span>🕯️ 環境控制：臥室全暗、安靜且溫度舒適</span></label>
        <label class="quiz-item"><input type="checkbox" class="q-check"><span>🚀 易睡體質：躺床後約 20–30 分鐘內入睡</span></label>
        <label class="quiz-item"><input type="checkbox" class="q-check"><span>💤 睡眠深度：半夜醒來不超過 1 次，或能迅速再入睡</span></label>
        <label class="quiz-item"><input type="checkbox" class="q-check"><span>☀️ 晨間精神：醒來神清氣爽，而不是感到疲累</span></label>
      </div>

      <button class="btn btn-main" id="btn-result" type="button">查看我的檢測結果</button>
    </div>

    <div id="result-box">
      <div class="banner" id="emoji-banner">
        <div class="big" id="banner-title">🌙</div>
        <div class="small" id="banner-sub">你的結果出爐啦</div>
      </div>

      <div class="score-title">📈 我的好眠指數</div>

      <div class="meter" aria-label="sleep score meter">
        <div id="meter-bar"></div>
      </div>

      <div class="score-line">
        <div class="score-badge" id="score-label">—</div>
        <div class="score-detail" id="score-detail">滿分 8 分</div>
      </div>

      <div class="feedback-text" id="feedback-msg"></div>

      <div class="share-actions">
        <button class="btn btn-share" id="btn-share" type="button">📣 產生結果圖卡</button>
        <button class="btn btn-reset" id="btn-reset" type="button">🔄 重新測試</button>
      </div>
    </div>
  </div> <!-- container -->

  <div class="brand-footer">
    <a href="https://www.tehtai.com.tw/locations/" target="_blank" rel="noopener">
      <img src="tehtailogo.png" alt="德泰法蘭西床">
    </a>
  </div>

  <!-- 分享 Modal（預覽＋分享/下載） -->
  <div class="share-modal" id="share-modal" aria-hidden="true">
    <div class="share-modal__panel">
      <div class="share-modal__preview">
        <img id="share-preview" alt="分享圖卡預覽">
      </div>
      <div class="share-modal__btns">
        <button class="btn btn-main" id="btn-share-native" type="button">分享</button>
        <button class="btn btn-secondary" id="btn-download" type="button">下載圖片</button>
        <button class="btn btn-secondary" id="btn-close-modal" type="button">關閉</button>
      </div>
    </div>
  </div>

  <!-- 隱藏圖卡（用 html2canvas 截成圖片） -->
  <div id="share-card-wrap" aria-hidden="true">
    <div id="share-card">
      <div class="share-emoji" id="share-emoji">🌙</div>

      <!-- (1) emoji 下方寫測驗標題 -->
      <div class="share-title">🌙 你是「睡眠模範生」還是「夜貓進修生」？🎓</div>

      <div class="share-score-title">我的好眠指數</div>
      <div class="share-score" id="share-score">0 / 8</div>
      <div class="share-label" id="share-label">好眠指數：—</div>

      <!-- (3) 用色塊框住結果敘述（色塊隨等級） -->
      <div class="share-subbox" id="share-sub">—</div>

      <!-- (4) 引導文字 + QR code -->
      <div class="share-cta">你也來測看看自己有沒有睡好呢?</div>
      <div class="share-qr">
        <div id="share-qr-box"></div>
      </div>

      <!-- (2) 底部只放 logo -->
      <div class="share-logo">
        <img id="share-logo"
             src=""
             alt="logo"
             crossorigin="anonymous">
      </div>
      <div class="share-url" id="share-url">tehtai.com.tw/locations</div>
    </div>
  </div>

  <!-- 需要：html2canvas（截圖）＋ qrcodejs（生成 QR） -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

  <script>
    const quizUI = document.getElementById('quiz-ui');
    const resultBox = document.getElementById('result-box');
    const feedbackMsg = document.getElementById('feedback-msg');
    const btnResult = document.getElementById('btn-result');
    const btnReset = document.getElementById('btn-reset');

    const bannerTitle = document.getElementById('banner-title');
    const bannerSub = document.getElementById('banner-sub');
    const scoreLabel = document.getElementById('score-label');
    const meterBar = document.getElementById('meter-bar');

    // 分享相關
    const btnShare = document.getElementById('btn-share');
    const shareModal = document.getElementById('share-modal');
    const sharePreview = document.getElementById('share-preview');
    const btnShareNative = document.getElementById('btn-share-native');
    const btnDownload = document.getElementById('btn-download');
    const btnCloseModal = document.getElementById('btn-close-modal');

    const shareCard = document.getElementById('share-card');
    const shareEmoji = document.getElementById('share-emoji');
    const shareScore = document.getElementById('share-score');
    const shareLabel = document.getElementById('share-label');
    const shareSub = document.getElementById('share-sub');
    const shareQrBox = document.getElementById('share-qr-box');
    const shareLogo = document.getElementById('share-logo');
    const shareUrl = document.getElementById('share-url');

    let lastScore = 0;
    let lastPack = null;

    // 存起來用於 Web Share / 下載
    let lastBlob = null;
    let lastFile = null;

    function getScore(){
      return document.querySelectorAll('.q-check:checked').length;
    }

    function resultPack(score){
      if (score >= 7) {
        return {
          level: "legend",
          banner: "🏆🌙✨",
          sub: "傳說級模範生：你是睡眠界資優生！",
          label: "好眠指數：優秀",
          text: "恭喜你！你的作息與睡眠品質都很到位。規律睡眠會讓精神、代謝與情緒更穩，繼續保持這份幸福能量吧！✨"
        };
      }
      if (score >= 5) {
        return {
          level: "good",
          banner: "🌿😴👍",
          sub: "穩定優等生：大多數日子都睡得不錯",
          label: "好眠指數：良好",
          text: "很棒！你的睡眠基礎很穩。只要再挑 1～2 項最容易做到的習慣加強（例如減少睡前的光線刺激），就很有機會往上加分！💪"
        };
      }
      if (score >= 3) {
        return {
          level: "warn",
          banner: "⚠️🕯️🥱",
          sub: "夜貓進修生：疲勞訊號出現了",
          label: "好眠指數：需加強",
          text: "警報響起！短期撐得住，但長期身體會抗議。今晚先從「提早 30 分鐘休息」或「固定起床時間」選一個開始改善，最有效。"
        };
      }
      return {
        level: "danger",
        banner: "😱🛌🌀",
        sub: "睡眠警示戶：身體需要更多修復時間",
        label: "好眠指數：偏低",
        text: "目前的睡眠狀態可能影響身體的修復與精神。除了建立固定起床時間與減少睡前光線刺激，也可檢視整體睡眠時數是否足夠（多數成人約需 7–9 小時）。若持續 2–4 週仍無改善，建議尋求專業醫師協助評估。"
      };
    }

    function showResults(){
      const score = getScore();
      const pack = resultPack(score);

      lastScore = score;
      lastPack = pack;

      const bannerEl = document.getElementById('emoji-banner');
      bannerEl.classList.remove('banner--legend','banner--good','banner--warn','banner--danger');

      if (score >= 7) bannerEl.classList.add('banner--legend');
      else if (score >= 5) bannerEl.classList.add('banner--good');
      else if (score >= 3) bannerEl.classList.add('banner--warn');
      else bannerEl.classList.add('banner--danger');

      bannerTitle.textContent = pack.banner;
      bannerSub.textContent = pack.sub;
      scoreLabel.textContent = pack.label;

      meterBar.style.width = `${Math.round((score / 8) * 100)}%`;
      document.getElementById('score-detail').textContent = `你的分數：${score} 分（滿分 8 分）`;

      feedbackMsg.innerHTML = pack.text;

      quizUI.style.display = 'none';
      resultBox.style.display = 'block';
      resultBox.classList.remove('fade-in');
      void resultBox.offsetWidth;
      resultBox.classList.add('fade-in');

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetGame(){
      document.querySelectorAll('.q-check').forEach(cb => cb.checked = false);
      resultBox.style.display = 'none';
      quizUI.style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 產生 QR（每次先清空）
    function renderQR(url){
      shareQrBox.innerHTML = '';
      new QRCode(shareQrBox, {
        text: url,
        width: 220,
        height: 220,
        colorDark: "#6f6256",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.M
      });
    }

    // 等圖片載入（避免破圖/截圖空白）
    function waitImageLoaded(imgEl){
      return new Promise((resolve) => {
        if (!imgEl) return resolve();
        if (imgEl.complete && imgEl.naturalWidth > 0) return resolve();
        imgEl.onload = () => resolve();
        imgEl.onerror = () => resolve();
      });
    }

    // 產生分享圖卡 PNG
    async function generateShareCard(){
      const pack = lastPack || resultPack(getScore());
      const score = lastScore ?? getScore();

      // 等級 class（控制色塊）
      shareCard.classList.remove('share--legend','share--good','share--warn','share--danger');
      shareCard.classList.add(`share--${pack.level}`);

      // 填內容
      shareEmoji.textContent = pack.banner;
      shareScore.textContent = `${score} / 8`;
      shareLabel.textContent = pack.label;
      shareSub.textContent = pack.sub;

      // QR 指向「同一份測驗網址」（支援 v2 / 子路徑）
      const quizUrl = `${location.origin}${location.pathname}`;
      renderQR(quizUrl);

      // 底部網址：固定顯示你要導流的 locations
      shareUrl.textContent = "tehtai.com.tw/locations";

      // logo：用同網域絕對路徑避免 github pages 相對路徑跑掉
      // ⚠️ 請確認檔名就是 "tehtailogo.png"（大小寫一致）
      shareLogo.src = `${location.origin}${location.pathname.replace(/\/[^\/]*$/, '/') }tehtailogo.png`;

      await waitImageLoaded(shareLogo);

      // 讓 QR canvas 渲染完成（等一拍）
      await new Promise(r => requestAnimationFrame(r));

      const canvas = await html2canvas(document.getElementById('share-card-wrap'), {
        backgroundColor: null,
        scale: 2,
        useCORS: true
      });

      return new Promise((resolve) => {
        canvas.toBlob((blob) => resolve(blob), "image/png", 1.0);
      });
    }

    function openModalWithBlob(blob){
      lastBlob = blob;
      lastFile = new File([blob], "sleep-quiz-result.png", { type: "image/png" });
      sharePreview.src = URL.createObjectURL(blob);
      shareModal.style.display = 'flex';
      shareModal.setAttribute('aria-hidden', 'false');
    }

    function closeModal(){
      shareModal.style.display = 'none';
      shareModal.setAttribute('aria-hidden', 'true');
    }

    // 原生分享（手機支援度較高；桌機通常不支援檔案分享）
    async function nativeShare(){
      if (!lastFile) return;

      const shareText = `我剛測了「睡眠模範生檢測」：${lastPack?.label || ''}（${lastScore}/8）\n你也來測看看：${location.origin}${location.pathname}`;

      if (navigator.share && navigator.canShare && navigator.canShare({ files: [lastFile] })) {
        try{
          await navigator.share({
            title: "睡眠模範生檢測",
            text: shareText,
            files: [lastFile]
          });
        }catch(e){
          // 使用者取消也會進來，直接忽略
        }
      } else {
        // 不支援就提示：請先下載再上傳到 IG/FB
        alert("你的裝置目前不支援直接分享圖片。\n已幫你準備好圖片，請按「下載圖片」後再發到 IG/FB/限動～");
      }
    }

    function downloadImage(){
      if (!lastBlob) return;
      const a = document.createElement('a');
      a.href = URL.createObjectURL(lastBlob);
      a.download = "sleep-quiz-result.png";
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

    // 綁事件
    btnResult.addEventListener('click', showResults);
    btnReset.addEventListener('click', resetGame);

    btnShare.addEventListener('click', async () => {
      // 沒測就先給結果（保險）
      if (!lastPack) {
        lastScore = getScore();
        lastPack = resultPack(lastScore);
      }

      btnShare.disabled = true;
      btnShare.textContent = "⏳ 產生中…";

      try{
        const blob = await generateShareCard();
        openModalWithBlob(blob);
      }finally{
        btnShare.disabled = false;
        btnShare.textContent = "📣 產生結果圖卡";
      }
    });

    btnShareNative.addEventListener('click', nativeShare);
    btnDownload.addEventListener('click', downloadImage);
    btnCloseModal.addEventListener('click', closeModal);

    shareModal.addEventListener('click', (e) => {
      if (e.target === shareModal) closeModal();
    });
  </script>
</body>
</html>
