<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌙睡眠模範生檢測｜德泰法蘭西床</title>

<style>

:root{
--bg:#f4f1ea;
--card:#ffffff;
--text:#6f6256;
--pink:#bca88f;
--blue:#9c8f7d;
--border:#f0ede5;
--shadow:0 10px 40px rgba(163,177,198,.15);
--soft:#fdfcf9;
--soft2:#f9f9f9;

--cardBg:#f6f2ea;
--cardText:#6f6256;

--lvl-legend:#efe3c7;
--lvl-good:#dbe7df;
--lvl-warn:#f0dfcf;
--lvl-danger:#e7c6c7;
}

*{box-sizing:border-box;}

body{
margin:0;
padding:20px;
background:var(--bg);
color:var(--text);
font-family:'PingFang TC','Microsoft JhengHei',sans-serif;
line-height:1.6;
}

.container{
max-width:560px;
margin:auto;
background:#fff;
border-radius:28px;
box-shadow:var(--shadow);
padding:30px 22px;
}

h1{
margin:0 0 10px 0;
color:var(--pink);
font-size:1.45rem;
font-weight:800;
text-align:center;
}

.subtitle{
margin:0 0 14px 0;
color:var(--blue);
font-size:.95rem;
font-weight:650;
text-align:center;
}

.note{
margin:0 0 20px 0;
background:var(--soft2);
border-radius:16px;
padding:12px 14px;
font-size:.9rem;
}

.quiz-item{
display:flex;
gap:14px;
background:var(--soft);
border:1px solid var(--border);
padding:14px 16px;
margin-bottom:12px;
border-radius:16px;
cursor:pointer;
}

input[type="checkbox"]{
transform:scale(1.15);
accent-color:var(--pink);
}

.btn{
width:100%;
border:none;
border-radius:999px;
padding:15px;
font-size:1.05rem;
font-weight:800;
cursor:pointer;
}

.btn-main{
background:var(--pink);
color:#fff;
}

.btn-reset{
margin-top:14px;
background:var(--blue);
color:#fff;
}

#result-box{display:none;}

.banner{
border-radius:18px;
padding:14px;
margin-bottom:14px;
text-align:center;
font-weight:900;
}

.score-title{
text-align:center;
font-weight:800;
margin:10px 0;
}

.meter{
background:#efece4;
border-radius:999px;
height:14px;
overflow:hidden;
margin-bottom:10px;
}

.meter div{
height:100%;
width:0%;
background:#a98f72;
}

.feedback-text{
background:var(--soft2);
padding:18px;
border-radius:18px;
}

.result-actions{
margin-top:12px;
}

.btn-secondary{
width:100%;
border:none;
border-radius:999px;
padding:14px;
font-weight:800;
background:#e9e2d7;
cursor:pointer;
}

.brand-footer{
text-align:center;
margin-top:12px;
opacity:.6;
}

.brand-footer img{
max-width:110px;
}

/* modal */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.modal.open{display:flex;}

.modal-panel{
width:min(820px,96vw);
background:#fff;
border-radius:18px;
padding:14px;
}

.preview-wrap{
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:#f7f4ef;
border-radius:14px;
padding:14px;
height:70vh;
}

/* share card */

#shareCard{
width:1080px;
height:1920px;
background:var(--cardBg);
border-radius:44px;
padding:220px 90px 260px;
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
color:var(--cardText);
}

.sc-title{
font-size:52px;
font-weight:900;
margin-bottom:40px;
}

.sc-emoji{
font-size:120px;
margin-bottom:20px;
}

.sc-h2{
font-size:70px;
margin-bottom:20px;
}

.sc-score{
font-size:160px;
font-weight:900;
}

.sc-label{
font-size:64px;
margin-bottom:30px;
}

.sc-block{
width:100%;
padding:40px;
border-radius:20px;
margin-bottom:40px;
}

.sc-block .b1{
font-size:66px;
font-weight:900;
}

.sc-block .b2{
font-size:54px;
}

.sc-cta{
font-size:42px;
margin-bottom:24px;
}

.sc-qr{
width:300px;
height:300px;
border-radius:12px;
background:#fff;
display:flex;
align-items:center;
justify-content:center;
}

.sc-logo{
position:absolute;
bottom:80px;
}

</style>
</head>

<body>

<div class="container">

<div id="quiz-ui">

<h1>🌙 你是「睡眠模範生」還是「夜貓進修生」？🎓</h1>

<p class="subtitle">✨ 3/13 世界睡眠日 ✨<br>做個簡單的小測驗</p>

<div class="quiz-list">

<label class="quiz-item"><input type="checkbox" class="q-check">規律作息</label>
<label class="quiz-item"><input type="checkbox" class="q-check">避免咖啡因</label>
<label class="quiz-item"><input type="checkbox" class="q-check">睡前不吃重食</label>
<label class="quiz-item"><input type="checkbox" class="q-check">睡前不滑手機</label>
<label class="quiz-item"><input type="checkbox" class="q-check">臥室環境舒適</label>
<label class="quiz-item"><input type="checkbox" class="q-check">20分鐘內入睡</label>
<label class="quiz-item"><input type="checkbox" class="q-check">半夜不醒</label>
<label class="quiz-item"><input type="checkbox" class="q-check">起床精神好</label>

</div>

<button class="btn btn-main" id="btn-result">查看結果</button>

</div>

<div id="result-box">

<div class="banner">
<div id="banner-title">🌙</div>
<div id="banner-sub">結果</div>
</div>

<div class="score-title">我的好眠指數</div>

<div class="meter"><div id="meter-bar"></div></div>

<div id="score-label"></div>

<div class="feedback-text" id="feedback-msg"></div>

<div class="result-actions">
<button class="btn-secondary" id="btn-share">📣 分享結果</button>
</div>

<button class="btn btn-reset" id="btn-reset">重新測試</button>

</div>

</div>

<div class="brand-footer">
<img src="../tehtailogo.png">
</div>

<div class="modal" id="cardModal">

<div class="modal-panel">

<div class="preview-wrap">

<div id="shareCard">

<div class="sc-title">🌙 睡眠檢測</div>

<div class="sc-emoji" id="scEmoji">🌙</div>

<div class="sc-h2">我的好眠指數</div>

<div class="sc-score" id="scScore">0 / 8</div>

<div class="sc-label" id="scLabel">好眠指數</div>

<div class="sc-block">
<div class="b1" id="scType"></div>
<div class="b2" id="scSub"></div>
</div>

<div class="sc-cta">你也來測看看</div>

<div class="sc-qr" id="scQr"></div>

</div>

</div>

<button id="btnDownloadCard">下載結果圖片</button>
<button id="btnSystemShare">分享到社群</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

const btnResult=document.getElementById("btn-result")
const btnShare=document.getElementById("btn-share")
const cardModal=document.getElementById("cardModal")
const scQr=document.getElementById("scQr")

function getScore(){
return document.querySelectorAll(".q-check:checked").length
}

function showResults(){

const score=getScore()

document.getElementById("meter-bar").style.width=(score/8*100)+"%"

document.getElementById("score-label").textContent="分數："+score

document.getElementById("feedback-msg").textContent="你的睡眠習慣評估完成"

document.getElementById("quiz-ui").style.display="none"
document.getElementById("result-box").style.display="block"

}

btnResult.onclick=showResults

btnShare.onclick=async()=>{

cardModal.classList.add("open")

const url="https://tehtai.github.io/sleep-quiz/v2/"

const qr=`https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=${encodeURIComponent(url)}`

scQr.innerHTML=`<img src="${qr}">`

}

async function exportCard(){

const clone=document.getElementById("shareCard").cloneNode(true)

clone.style.position="fixed"
clone.style.left="-9999px"
clone.style.transform="none"

document.body.appendChild(clone)

const canvas=await html2canvas(clone,{scale:2})

clone.remove()

return new Promise(r=>canvas.toBlob(r,"image/png"))

}

document.getElementById("btnDownloadCard").onclick=async()=>{

const blob=await exportCard()

const url=URL.createObjectURL(blob)

const a=document.createElement("a")

a.href=url
a.download="sleep-result.png"

a.click()

}

document.getElementById("btnSystemShare").onclick=async()=>{

const blob=await exportCard()

const file=new File([blob],"sleep-result.png",{type:"image/png"})

if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){

navigator.share({files:[file]})

}else{

alert("此瀏覽器不支援下載/分享圖片，建議使用Chrome瀏覽器開啟。")

}

}

</script>

</body>
</html>
