<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌙睡眠模範生檢測｜德泰法蘭西床</title>
  <style>
    :root{
      --bg:#f4f1ea;
      --card:#ffffff;
      --text:#6f6256;
      --pink:#bca88f;
      --blue:#9c8f7d;
      --border:#f0ede5;
      --shadow:0 10px 40px rgba(163,177,198,.15);
      --soft:#fdfcf9;
      --soft2:#f9f9f9;

      /* share card base */
      --cardBg:#f6f2ea;
      --cardText:#6f6256;
      --cardSub:#7f6e5c;

      /* level blocks */
      --lvl-legend:#efe3c7;
      --lvl-good:#dbe7df;
      --lvl-warn:#f0dfcf;
      --lvl-danger:#e7c6c7;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      padding:20px;
      background:var(--bg);
      color:var(--text);
      font-family:'PingFang TC','Microsoft JhengHei',sans-serif;
      line-height:1.6;
    }
    .container{
      max-width:clamp(480px, 90%, 560px);
      margin:0 auto;
      background:var(--card);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:30px 22px;
    }
    h1{
      margin:0 0 10px 0;
      color:var(--pink);
      font-size:1.45rem;
      line-height:1.35;
      font-weight:800;
      text-align:center;
    }
    .subtitle{
      margin:0 0 14px 0;
      color:var(--blue);
      font-size:.95rem;
      font-weight:650;
      text-align:center;
    }
    .note{
      margin:0 0 20px 0;
      background:var(--soft2);
      border-radius:16px;
      padding:12px 14px;
      font-size:.9rem;
      line-height:1.7;
    }
    .note strong{ color:var(--text); }

    .note-list{
      margin:0;
      padding-left:18px;
      line-height:1.75;
    }
    .note-list li{ margin:6px 0; }
    .note strong{ font-weight:800; }

    .quiz-list{ margin:0 0 18px 0; padding:0; }
    .quiz-item{
      display:flex;
      align-items:flex-start;
      gap:14px;
      background:var(--soft);
      border:1px solid var(--border);
      padding:14px 16px;
      margin:0 0 12px 0;
      border-radius:16px;
      cursor:pointer;
      transition:transform .15s ease, border-color .15s ease, background-color .15s ease;
      user-select:none;
    }
    .quiz-item:hover{
      background:#fff;
      border-color:var(--pink);
      transform:translateY(-1px);
    }
    .quiz-item span{
      display:block;
      font-size:.98rem;
      line-height:1.45;
    }
    input[type="checkbox"]{
      margin-top:2px;
      transform:scale(1.15);
      accent-color:var(--pink);
      cursor:pointer;
      flex:0 0 auto;
    }

    .btn{
      width:100%;
      border:none;
      border-radius:999px;
      padding:15px 16px;
      font-size:1.05rem;
      font-weight:800;
      cursor:pointer;
      transition:transform .15s ease, filter .15s ease;
    }
    .btn-main{
      background:var(--pink);
      color:#fff;
      box-shadow:0 4px 12px rgba(224,175,180,.28);
    }
    .btn-main:hover{ transform:scale(1.01); filter:brightness(.98); }

    .btn-reset{
      margin-top:14px;
      background:var(--blue);
      color:#fff;
    }
    .btn-reset:hover{ transform:scale(1.01); filter:brightness(.97); }

    #result-box{ display:none; }
    .fade-in{ animation:fadeIn .45s ease; }
    @keyframes fadeIn{
      from{ opacity:0; transform:translateY(10px); }
      to{ opacity:1; transform:translateY(0); }
    }

    .banner{
      border-radius:18px;
      padding:14px 16px;
      margin:0 0 14px 0;
      text-align:center;
      font-weight:900;
      letter-spacing:.3px;
      background:linear-gradient(180deg, rgba(224,175,180,.22), rgba(163,177,198,.16));
    }
    .banner--legend{
      background: linear-gradient(135deg, rgba(235, 211, 156, 0.55), rgba(204, 173, 104, 0.35));
    }
    .banner--good{
      background: linear-gradient(135deg, rgba(176, 205, 186, 0.55), rgba(129, 168, 148, 0.35));
    }
    .banner--warn{
      background: linear-gradient(135deg, rgba(241, 186, 140, 0.55), rgba(215, 143, 95, 0.35));
    }
    .banner--danger{
      background: linear-gradient(135deg, rgba(224, 175, 180, 0.65), rgba(193, 135, 143, 0.4));
    }

    .banner .big{
      font-size:1.2rem;
      margin-bottom:4px;
    }
    .banner .small{
      font-size:1.05rem;
      font-weight:800;
    }

    .score-title{
      text-align:center;
      font-size:1.02rem;
      font-weight:800;
      color:var(--blue);
      margin:8px 0 8px 0;
    }

    .meter{
      background:#efece4;
      border-radius:999px;
      height:14px;
      overflow:hidden;
      border:1px solid var(--border);
      margin:0 0 10px 0;
    }
    .meter > div{
      height:100%;
      width:0%;
      background:linear-gradient(90deg, #8c755f 0%, #a98f72 60%, #bda385 100%);
      transition:width .4s ease;
    }

    .score-line{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin:0 0 10px 0;
      font-weight:800;
    }
    .score-badge{
      padding:6px 12px;
      border-radius:999px;
      background:#efe7dd;
      border:1px solid #d8c8b6;
      color:#7f6e5c;
      font-size:.92rem;
      white-space:nowrap;
    }
    .score-detail{
      font-size:.92rem;
      opacity:.9;
      white-space:nowrap;
    }

    .feedback-text{
      background:var(--soft2);
      padding:18px 18px;
      border-radius:18px;
      font-size:1rem;
      line-height:1.85;
      margin:0 0 12px 0;
    }

    /* 結果頁按鈕區（避免桌機跑版） */
    .result-actions{
      display:flex;
      gap:10px;
      margin-top:12px;
      flex-wrap:wrap;
    }
    .btn-secondary{
      width:100%;
      border:none;
      border-radius:999px;
      padding:14px 16px;
      font-size:1rem;
      font-weight:800;
      cursor:pointer;
      background:#e9e2d7;
      color:#6f6256;
      border:1px solid #d8c8b6;
      transition:transform .15s ease, filter .15s ease;
    }
    .btn-secondary:hover{ transform:scale(1.01); filter:brightness(.99); }

    @media (min-width:520px){
      .result-actions .btn-secondary{ width:calc(50% - 5px); }
    }

    @media (max-width:420px){
      body{ padding:14px; }
      .container{ padding:24px 16px; border-radius:22px; }
      h1{ font-size:1.28rem; }
      .subtitle{ font-size:.9rem; }
      .quiz-item{ padding:12px 14px; }
    }

    /* LOGO footer */
    .brand-footer{
      text-align:center;
      margin-top:12px;
      opacity:.6;
    }
    .brand-footer img{
      max-width:110px;
      height:auto;
      display:inline-block;
    }

    /* ===== 分享圖卡 Modal（不滾動、不裁切） ===== */
    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.45);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:9999;
    }
    .modal.open{ display:flex; }

    .modal-panel{
      width:min(820px, 96vw);
      background:#fff;
      border-radius:18px;
      box-shadow:0 18px 60px rgba(0,0,0,.25);
      padding:14px;
    }
    .modal-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
    }
    .modal-top .hint{
      font-weight:800;
      color:#6f6256;
      font-size:.95rem;
    }
    .icon-btn{
      border:none;
      background:#f2eee7;
      border:1px solid #e5dccf;
      border-radius:12px;
      padding:8px 10px;
      cursor:pointer;
      font-weight:900;
      color:#6f6256;
    }

    .preview-wrap{
      width:100%;
      display:flex;
      justify-content:center;
      overflow:hidden;
      background:#f7f4ef;
      border:1px solid #efe6d9;
      border-radius:14px;
      padding:14px 8px;
    }

    /* 固定 1080x1920 原尺寸（生成用） */
    #shareCard{
      width:1080px;
      height:1920px;
      background:var(--cardBg);
      border-radius:44px;
      padding:120px 90px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      box-sizing:border-box;
      color:var(--cardText);
      position:relative;
    }

    /* 預覽縮小：桌機/手機都看得到完整圖卡 */
    .preview-wrap #shareCard{
      transform:scale(.33);
        transform-origin: top center;
        will-change: transform;
    }
    @media (max-width:520px){
      .preview-wrap #shareCard{ transform:scale(.23); }
    }

    .sc-title{
      font-size:52px;
      font-weight:900;
      text-align:center;
      line-height:1.25;
      margin:0 0 50px 0;
      color:#6f6256;
    }
    .sc-emoji{
      font-size:120px;
      line-height:1;
      margin:10px 0 34px 0;
    }
    .sc-h2{
      font-size:72px;
      font-weight:900;
      margin:0 0 26px 0;
      letter-spacing:.5px;
    }
    .sc-score{
      font-size:160px;
      font-weight:900;
      margin:0 0 24px 0;
    }
    .sc-label{
      font-size:70px;
      font-weight:900;
      margin:0 0 44px 0;
    }

    .sc-im{
      font-size:74px;
      font-weight:900;
      margin:0 0 12px 0;
    }

    .sc-block{
      width:100%;
      border-radius:22px;
      padding:44px 40px;
      text-align:center;
      margin:24px 0 48px 0;
    }
    .sc-block .b1{
      font-size:66px;
      font-weight:900;
      margin-bottom:12px;
    }
    .sc-block .b2{
      font-size:56px;
      font-weight:800;
      opacity:.95;
    }

    .sc-cta{
      font-size:44px;
      font-weight:800;
      margin:12px 0 26px 0;
      text-align:center;
      color:#7f6e5c;
    }

    .sc-qr{
      width:320px;
      height:320px;
      border-radius:16px;
      background:#fff;
      border:1px solid #e6dccf;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:10px 0 34px 0;
      overflow:hidden;
    }
    .sc-qr svg{ width:260px; height:260px; display:block; }

    .sc-logo{
      position:absolute;
      bottom:70px;
      left:0;
      right:0;
      display:flex;
      justify-content:center;
      align-items:center;
      pointer-events:none;
    }
    .sc-logo img{
      width:220px;
      height:auto;
      display:block;
      opacity:.95;
    }

    /* 四等級：色塊底色 */
    #shareCard.level-legend .sc-block{ background:var(--lvl-legend); }
    #shareCard.level-good   .sc-block{ background:var(--lvl-good); }
    #shareCard.level-warn   .sc-block{ background:var(--lvl-warn); }
    #shareCard.level-danger .sc-block{ background:var(--lvl-danger); }

    .modal-actions{
      display:flex;
      gap:10px;
      margin-top:10px;
      flex-wrap:wrap;
    }
    .modal-actions button{
      flex:1 1 160px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div id="quiz-ui">
      <h1>🌙 你是「睡眠模範生」還是「夜貓進修生」？🎓</h1>
      <p class="subtitle">✨ 3/13 世界睡眠日 ✨<br>做個簡單的小測驗，檢視一下日常的睡眠狀況吧！</p>

      <div class="note">
        <ul class="note-list">
          <li><strong>作答方式：</strong>請依<strong>最近 2 週～1 個月</strong>的睡眠狀況勾選。</li>
          <li>本測驗為日常睡眠習慣自我檢視，非醫療評估用途。</li>
        </ul>
      </div>

      <div class="quiz-list">
        <label class="quiz-item"><input type="checkbox" class="q-check"><span>🕰️ 規律作息：每天固定時間起床（±1小時內）</span></label>
        <label class="quiz-item"><input type="checkbox" class="q-check"><span>☕ 避開刺激：下午 3 點後避免咖啡因（咖啡、濃茶、能量飲）</span></label>
        <label class="quiz-item"><input type="checkbox" class="q-check"><span>🍛 腸胃放鬆：睡前 2–3 小時不吃高油脂、高熱量或過飽</span></label>
        <label class="quiz-item"><input type="checkbox" class="q-check"><span>📱 數位斷食：睡前 30–60 分鐘不滑手機</span></label>
        <label class="quiz-item"><input type="checkbox" class="q-check"><span>🕯️ 環境控制：臥室全暗、安靜且溫度舒適</span></label>
        <label class="quiz-item"><input type="checkbox" class="q-check"><span>🚀 易睡體質：躺床後約 20–30 分鐘內入睡</span></label>
        <label class="quiz-item"><input type="checkbox" class="q-check"><span>💤 睡眠深度：半夜醒來不超過 1 次，或能迅速再入睡</span></label>
        <label class="quiz-item"><input type="checkbox" class="q-check"><span>☀️ 晨間精神：醒來神清氣爽，而不是感到疲累</span></label>
      </div>

      <button class="btn btn-main" id="btn-result" type="button">查看我的檢測結果</button>
    </div>

    <div id="result-box">
      <div class="banner" id="emoji-banner">
        <div class="big" id="banner-title">🌙</div>
        <div class="small" id="banner-sub">你的結果出爐啦</div>
      </div>

      <div class="score-title">📈 我的好眠指數</div>

      <div class="meter" aria-label="sleep score meter">
        <div id="meter-bar"></div>
      </div>

      <div class="score-line">
        <div class="score-badge" id="score-label">—</div>
        <div class="score-detail" id="score-detail">滿分 8 分</div>
      </div>

      <div class="feedback-text" id="feedback-msg"></div>

      <!-- ✅ 新增：產生圖卡 & 分享/下載（不影響你原本設定） -->
      <div class="result-actions">
        <button class="btn-secondary" id="btn-card" type="button">🖼️ 產生結果圖卡</button>
        <button class="btn-secondary" id="btn-share" type="button">📣 分享結果</button>
      </div>

      <button class="btn btn-reset" id="btn-reset" type="button">🔄 重新測試</button>
    </div>
  </div>

  <div class="brand-footer">
    <a href="https://www.tehtai.com.tw/locations/" target="_blank" rel="noopener">
      <img src="../tehtailogo.png" alt="德泰法蘭西床">
    </a>
  </div>

  <!-- ✅ Modal：預覽 1080x1920（縮小顯示） -->
  <div class="modal" id="cardModal" aria-hidden="true">
    <div class="modal-panel">
      <div class="modal-top">
        <div class="hint">圖卡預覽（下載會是 1080×1920）</div>
        <button class="icon-btn" id="btnCloseModal" type="button">✕</button>
      </div>

      <div class="preview-wrap">
        <div id="shareCard">
          <div class="sc-title" id="scTitle">🌙 你是「睡眠模範生」還是「夜貓進修生」？🎓</div>

          <!-- 這裡只顯示一次 emoji（避免你說的「多一次」問題） -->
          <div class="sc-emoji" id="scEmoji">🌙</div>

          <div class="sc-h2">我的好眠指數</div>
          <div class="sc-score" id="scScore">0 / 8</div>
          <div class="sc-label" id="scLabel">好眠指數：偏低</div>

          <div class="sc-im">我是：</div>

          <div class="sc-block" id="scBlock">
            <div class="b1" id="scType">睡眠警示戶</div>
            <div class="b2" id="scSub">身體需要更多修復時間</div>
          </div>

          <div class="sc-cta">你也來測看看自己有沒有睡好呢？</div>

          <div class="sc-qr" id="scQr"></div>

          <div class="sc-logo">
            <img src="../tehtailogo.png" alt="德泰法蘭西床">
          </div>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn-secondary" id="btnDownloadCard" type="button">⬇️ 下載圖卡</button>
        <button class="btn-secondary" id="btnSystemShare" type="button">📤 用系統分享（手機支援）</button>
      </div>
    </div>
  </div>

  <!-- html2canvas -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <script>
    const quizUI = document.getElementById('quiz-ui');
    const resultBox = document.getElementById('result-box');
    const feedbackMsg = document.getElementById('feedback-msg');
    const btnResult = document.getElementById('btn-result');
    const btnReset = document.getElementById('btn-reset');

    const bannerTitle = document.getElementById('banner-title');
    const bannerSub = document.getElementById('banner-sub');
    const scoreLabel = document.getElementById('score-label');
    const meterBar = document.getElementById('meter-bar');

    // share modal
    const cardModal = document.getElementById('cardModal');
    const btnCard = document.getElementById('btn-card');
    const btnShare = document.getElementById('btn-share');
    const btnCloseModal = document.getElementById('btnCloseModal');
    const btnDownloadCard = document.getElementById('btnDownloadCard');
    const btnSystemShare = document.getElementById('btnSystemShare');

    // share card nodes
    const shareCard = document.getElementById('shareCard');
    const scEmoji = document.getElementById('scEmoji');
    const scScore = document.getElementById('scScore');
    const scLabel = document.getElementById('scLabel');
    const scType = document.getElementById('scType');
    const scSub = document.getElementById('scSub');
    const scQr = document.getElementById('scQr');

    let latestScore = 0;
    let latestPack = null;

    function getScore(){
      return document.querySelectorAll('.q-check:checked').length;
    }

    function resultPack(score){
      if (score >= 7) {
        return {
          banner: "🏆🌙✨",
          sub: "傳說級模範生：你是睡眠界資優生！",
          type: "傳說級模範生",
          sub2: "你是睡眠界資優生！",
          label: "好眠指數：優秀",
          text: "恭喜你！你的作息與睡眠品質都很到位。規律睡眠會讓精神、代謝與情緒更穩，繼續保持這份幸福能量吧！✨"
        };
      }
      if (score >= 5) {
        return {
          banner: "🌿😴👍",
          sub: "穩定優等生：大多數日子都睡得不錯",
          type: "穩定優等生",
          sub2: "大多數日子都睡得不錯",
          label: "好眠指數：良好",
          text: "很棒！你的睡眠基礎很穩。只要再挑 1～2 項最容易做到的習慣加強（例如減少睡前的光線刺激），就很有機會往上加分！💪"
        };
      }
      if (score >= 3) {
        return {
          banner: "⚠️🕯️🥱",
          sub: "夜貓進修生：疲勞訊號出現了",
          type: "夜貓進修生",
          sub2: "疲勞訊號出現了",
          label: "好眠指數：需加強",
          text: "警報響起！短期撐得住，但長期身體會抗議。今晚先從「提早 30 分鐘休息」或「固定起床時間」選一個開始改善，最有效。"
        };
      }
      return {
        banner: "😱🛌🌀",
        sub: "睡眠警示戶：身體需要更多修復時間",
        type: "睡眠警示戶",
        sub2: "身體需要更多修復時間",
        label: "好眠指數：偏低",
        text: "目前的睡眠狀態可能影響身體的修復與精神。除了建立固定起床時間與減少睡前光線刺激，也可檢視整體睡眠時數是否足夠（多數成人約需 7–9 小時）。若持續 2–4 週仍無改善，建議尋求專業醫師協助評估。"
      };
    }

    function setBannerClass(score){
      const bannerEl = document.getElementById('emoji-banner');
      bannerEl.classList.remove('banner--legend','banner--good','banner--warn','banner--danger');
      if (score >= 7) bannerEl.classList.add('banner--legend');
      else if (score >= 5) bannerEl.classList.add('banner--good');
      else if (score >= 3) bannerEl.classList.add('banner--warn');
      else bannerEl.classList.add('banner--danger');
    }

    function setShareCardLevel(score){
      shareCard.classList.remove('level-legend','level-good','level-warn','level-danger');
      if (score >= 7) shareCard.classList.add('level-legend');
      else if (score >= 5) shareCard.classList.add('level-good');
      else if (score >= 3) shareCard.classList.add('level-warn');
      else shareCard.classList.add('level-danger');
    }

    // ✅ 產生 QR（SVG，穩，不會變色）
    function generateQrSvg(text, size=260){
      // 用第三方簡易 API 拿 SVG（顏色不亂、解析度穩）
      // 你也可以換成你自己的 QR 產生方式
      const url = "https://api.qrserver.com/v1/create-qr-code/?format=svg&size="+size+"x"+size+"&data=" + encodeURIComponent(text);
      return fetch(url).then(r=>r.text());
    }
function fitShareCardPreview(){
  const wrap = document.querySelector('.preview-wrap');
  if(!wrap) return;

  // 可用空間（留一點邊界）
  const padding = 16;
  const availW = wrap.clientWidth - padding * 2;
  const availH = wrap.clientHeight - padding * 2;

  // 分享卡原尺寸
  const baseW = 1080;
  const baseH = 1920;

  // 依照寬高取最小縮放，避免裁切
  const scale = Math.min(availW / baseW, availH / baseH);

  // 套用縮放
  shareCard.style.transform = `scale(${scale})`;
}
    function openModal(){
  cardModal.classList.add('open');
  cardModal.setAttribute('aria-hidden','false');

  // ✅ 等 DOM 顯示後再算縮放
  requestAnimationFrame(() => {
    fitShareCardPreview();
  });
}
    function closeModal(){
      cardModal.classList.remove('open');
      cardModal.setAttribute('aria-hidden','true');
    }

    async function buildShareCard(){
      if(!latestPack) return;

      const score = latestScore;
      const pack = latestPack;

      // ✅ 只顯示一次 emoji
      scEmoji.textContent = pack.banner;

      scScore.textContent = `${score} / 8`;
      scLabel.textContent = pack.label;

      scType.textContent = pack.type;
      scSub.textContent = pack.sub2;

      setShareCardLevel(score);

      // QR：指向測驗頁（你現在的 GitHub Pages）
      const quizUrl = location.href; // 會是目前頁面網址
      scQr.innerHTML = ""; // 清空
      try{
        const svg = await generateQrSvg(quizUrl, 260);
        scQr.innerHTML = svg;
      }catch(e){
        scQr.textContent = "QR 產生失敗";
      }
    }

    async function exportCardBlob(){
  const prevTransform = shareCard.style.transform;
  shareCard.style.transform = 'none';

  const canvas = await html2canvas(shareCard, {
    scale: 2,
    useCORS: true,
    backgroundColor: null
  });

  shareCard.style.transform = prevTransform;

  return new Promise(resolve => canvas.toBlob(resolve, "image/png", 1));
}

    async function downloadCard(){
      const blob = await exportCardBlob();
      if(!blob) return;
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "sleep-result.png";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    async function systemShare(){
      const blob = await exportCardBlob();
      if(!blob) return;

      const file = new File([blob], "sleep-result.png", { type:"image/png" });

      // Web Share API（手機 Chrome / Samsung Internet 通常 OK；iOS Safari 視版本）
      if(navigator.share && navigator.canShare && navigator.canShare({ files:[file] })){
        await navigator.share({
          title: "我的好眠指數",
          text: "我做了睡眠小測驗，你也來測看看！",
          files: [file]
        });
      }else{
        // fallback：直接下載
        alert("這個瀏覽器不支援直接分享圖片，已改用「下載圖卡」方式最穩～");
        await downloadCard();
      }
    }

    function showResults(){
      const score = getScore();
      const pack = resultPack(score);

      latestScore = score;
      latestPack = pack;

      setBannerClass(score);

      bannerTitle.textContent = pack.banner;
      bannerSub.textContent = pack.sub;
      scoreLabel.textContent = pack.label;

      meterBar.style.width = `${Math.round((score / 8) * 100)}%`;
      document.getElementById('score-detail').textContent = `你的分數：${score} 分（滿分 8 分）`;

      feedbackMsg.innerHTML = pack.text;

      quizUI.style.display = 'none';
      resultBox.style.display = 'block';
      resultBox.classList.remove('fade-in');
      void resultBox.offsetWidth;
      resultBox.classList.add('fade-in');

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetGame(){
      document.querySelectorAll('.q-check').forEach(cb => cb.checked = false);
      resultBox.style.display = 'none';
      quizUI.style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    btnResult.addEventListener('click', showResults);
    btnReset.addEventListener('click', resetGame);

    // ✅ 產生圖卡（開 modal + 更新內容）
    btnCard.addEventListener('click', async ()=>{
      if(!latestPack){
        alert("請先點「查看我的檢測結果」產生結果後，再產生圖卡喔！");
        return;
      }
      await buildShareCard();
      openModal();
    });

    // ✅ 分享結果（優先開 modal，讓使用者先看圖）
    btnShare.addEventListener('click', async ()=>{
      if(!latestPack){
        alert("請先點「查看我的檢測結果」產生結果後，再分享喔！");
        return;
      }
      await buildShareCard();
      openModal();
    });

    btnCloseModal.addEventListener('click', closeModal);
    cardModal.addEventListener('click', (e)=>{
      if(e.target === cardModal) closeModal();
    });

    btnDownloadCard.addEventListener('click', downloadCard);
    btnSystemShare.addEventListener('click', systemShare);
window.addEventListener('resize', () => {
  if(cardModal.classList.contains('open')) fitShareCardPreview();
});
    
  </script>
</body>
</html>
