<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌙睡眠模範生檢測｜德泰法蘭西床</title>

<style>
:root {
  --bg-color: #f4f1ea;
  --card-bg: #ffffff;
  --text-main: #57606f;
  --accent-pink: #e0afb4;
  --accent-blue: #a3b1c6;
  --shadow: 0 10px 40px rgba(163,177,198,0.15);
}

body{
  margin:0;
  padding:20px;
  background:var(--bg-color);
  font-family:'PingFang TC','Microsoft JhengHei',sans-serif;
  color:var(--text-main);
}

.container{
  max-width:480px;
  margin:auto;
  background:var(--card-bg);
  border-radius:30px;
  padding:35px 25px;
  box-shadow:var(--shadow);
}

h1{
  text-align:center;
  color:var(--accent-pink);
  font-size:1.4rem;
  margin-bottom:10px;
}

.subtitle{
  text-align:center;
  color:var(--accent-blue);
  font-size:.9rem;
  margin-bottom:20px;
}

.note{
  background:#f9f9f9;
  padding:12px;
  border-radius:16px;
  font-size:.9rem;
  margin-bottom:20px;
  line-height:1.7;
}

.quiz-item{
  display:flex;
  gap:12px;
  background:#fdfcf9;
  border:1px solid #f0ede5;
  padding:14px;
  border-radius:15px;
  margin-bottom:12px;
  cursor:pointer;
}

input[type="checkbox"]{
  transform:scale(1.2);
  accent-color:var(--accent-pink);
}

.btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:35px;
  font-weight:600;
  cursor:pointer;
}

.btn-main{
  background:var(--accent-pink);
  color:#fff;
}

.btn-reset{
  background:var(--accent-blue);
  color:#fff;
  margin-top:15px;
}

/* ===== Banner 顏色分級 ===== */

.banner{
  border-radius:20px;
  padding:18px;
  text-align:center;
  margin-bottom:20px;
  color:#fff;
}

.banner--legend{
  background:linear-gradient(135deg,#e7c97f,#caa85a);
}

.banner--good{
  background:linear-gradient(135deg,#a8c8b0,#7aa58a);
}

.banner--warn{
  background:linear-gradient(135deg,#f2b47c,#de8f5c);
}

.banner--danger{
  background:linear-gradient(135deg,#e0afb4,#c88f9a);
}

.banner .title{
  font-size:1.6rem;
  margin-bottom:6px;
}

.banner .subtitle-text strong{
  display:block;
  font-size:1.2rem;
  margin-bottom:4px;
}

.meter{
  height:14px;
  background:#eee;
  border-radius:999px;
  overflow:hidden;
  margin-bottom:10px;
}

.meter div{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--accent-blue),var(--accent-pink));
  transition:width .4s ease;
}

.feedback{
  background:#f9f9f9;
  padding:20px;
  border-radius:20px;
  line-height:1.8;
  margin-bottom:10px;
}

#result-box{display:none;}
</style>
</head>

<body>

<div class="container">

<div id="quiz-ui">

<h1>🌙 你是「睡眠模範生」<br>還是「熬夜特種兵」？🎓</h1>

<p class="subtitle">
✨ 3/13 世界睡眠日 ✨<br>
做個簡單的小測驗，檢視一下日常的睡眠狀況吧！
</p>

<div class="note">
請以近 2 週～1 個月「多數日子」為準作答。<br>
每勾選 1 項 +1 分，滿分 10 分。
</div>

<div class="quiz-list">
<label class="quiz-item"><input type="checkbox" class="q-check">🕰️ 規律作息：每天固定時間起床</label>
<label class="quiz-item"><input type="checkbox" class="q-check">📱 數位斷食：睡前1小時不看手機</label>
<label class="quiz-item"><input type="checkbox" class="q-check">☕ 避開刺激：下午3點後不攝取咖啡因</label>
<label class="quiz-item"><input type="checkbox" class="q-check">🧘 舒壓儀式：睡前看書、冥想或聽音樂</label>
<label class="quiz-item"><input type="checkbox" class="q-check">🕯️ 環境控制：臥室全暗且溫度舒適</label>
<label class="quiz-item"><input type="checkbox" class="q-check">🥃 酒精斷捨離：睡前不依賴酒精助眠</label>
<label class="quiz-item"><input type="checkbox" class="q-check">🍛 腸胃放鬆：睡前3小時不吃大餐或宵夜</label>
<label class="quiz-item"><input type="checkbox" class="q-check">🚀 秒睡體質：躺下後20分鐘內能入睡</label>
<label class="quiz-item"><input type="checkbox" class="q-check">💤 睡眠深度：半夜不輕易醒來或能秒睡回</label>
<label class="quiz-item"><input type="checkbox" class="q-check">☀️ 晨間精神：醒來感到神清氣爽而非疲累</label>
</div>

<button class="btn btn-main" onclick="showResults()">查看我的檢測結果 ✨</button>

</div>

<div id="result-box">

<div id="banner" class="banner">
<div class="title" id="banner-title"></div>
<div class="subtitle-text" id="banner-sub"></div>
</div>

<div class="meter"><div id="meter-bar"></div></div>

<div id="score-text"></div>

<div class="feedback" id="feedback-msg"></div>

<button class="btn btn-reset" onclick="resetGame()">🔄 重新測試</button>

</div>

</div>

<script>

function showResults(){
const score=document.querySelectorAll('.q-check:checked').length;
const banner=document.getElementById("banner");
const title=document.getElementById("banner-title");
const sub=document.getElementById("banner-sub");
const feedback=document.getElementById("feedback-msg");
const meter=document.getElementById("meter-bar");
const scoreText=document.getElementById("score-text");

banner.className="banner";

if(score>=9){
banner.classList.add("banner--legend");
title.textContent="🏆🌙✨";
sub.innerHTML="<strong>傳說級模範生</strong>你簡直是睡眠界的資優生。規律的作息讓你擁有極高的生活品質！";
feedback.innerHTML="🏆 <strong>傳說級模範生</strong><br>恭喜你！你簡直是睡眠界的資優生。規律的作息讓你擁有極高的生活品質，請繼續保持這份幸福的能量，讓身體每天都在巔峰狀態！✨";
}
else if(score>=6){
banner.classList.add("banner--good");
title.textContent="🌿😴👍";
sub.innerHTML="<strong>穩定優等生</strong>大部分時間都能好好休息";
feedback.innerHTML="🌿 <strong>穩定優等生</strong><br>很棒！你的睡眠基礎打得很穩。雖然偶爾會被生活瑣事干擾，但大部分時間都能好好休息。只要再調整一下微小的壞習慣，就能晉升神人級別囉！💪";
}
else if(score>=3){
banner.classList.add("banner--warn");
title.textContent="⚠️🥱";
sub.innerHTML="<strong>熬夜特種兵</strong>你的大腦正在發出疲勞訊號";
feedback.innerHTML="⚠️ <strong>熬夜特種兵</strong><br>警報響起！你的大腦正在發出疲勞訊號。今晚試著提早 30 分鐘關燈吧！🕯️";
}
else{
banner.classList.add("banner--danger");
title.textContent="😱🛌";
sub.innerHTML="<strong>睡眠特困戶</strong>你的睡眠債已經嚴重超支";
feedback.innerHTML="😱 <strong>睡眠特困戶</strong><br>天啊！你的睡眠債已經嚴重超支了！今晚請放下所有事，直接原地躺平吧！🛌";
}

meter.style.width=(score*10)+"%";
scoreText.innerHTML="你的分數："+score+" 分（滿分10分）";

document.getElementById("quiz-ui").style.display="none";
document.getElementById("result-box").style.display="block";
}

function resetGame(){
document.querySelectorAll('.q-check').forEach(cb=>cb.checked=false);
document.getElementById("result-box").style.display="none";
document.getElementById("quiz-ui").style.display="block";
}

</script>

</body>
</html>
