<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌙睡眠模範生檢測｜德泰法蘭西床</title>

<style>
:root{
  --bg:#f4f1ea;
  --card:#ffffff;
  --text:#57606f;
  --pink:#e0afb4;
  --blue:#a3b1c6;
  --border:#f0ede5;
  --shadow:0 10px 40px rgba(163,177,198,.15);
}

*{box-sizing:border-box;}

body{
  margin:0;
  padding:20px;
  background:var(--bg);
  color:var(--text);
  font-family:'PingFang TC','Microsoft JhengHei',sans-serif;
}

.container{
  max-width:480px;
  margin:auto;
  background:var(--card);
  border-radius:28px;
  box-shadow:var(--shadow);
  padding:30px 22px;
}

h1{
  text-align:center;
  color:var(--pink);
  font-size:1.4rem;
  margin-bottom:10px;
}

.subtitle{
  text-align:center;
  color:var(--blue);
  font-size:.95rem;
  font-weight:600;
  margin-bottom:20px;
}

.note{
  background:#f9f9f9;
  padding:12px;
  border-radius:16px;
  font-size:.9rem;
  margin-bottom:20px;
  line-height:1.7;
}

.quiz-item{
  display:flex;
  gap:12px;
  align-items:flex-start;
  background:#fdfcf9;
  border:1px solid var(--border);
  padding:14px;
  border-radius:16px;
  margin-bottom:12px;
  cursor:pointer;
}

.quiz-item:hover{
  border-color:var(--pink);
}

input[type="checkbox"]{
  transform:scale(1.2);
  accent-color:var(--pink);
}

.btn{
  width:100%;
  padding:15px;
  border:none;
  border-radius:999px;
  font-weight:700;
  cursor:pointer;
}

.btn-main{
  background:var(--pink);
  color:#fff;
}

.btn-reset{
  background:var(--blue);
  color:#fff;
  margin-top:15px;
}

/* ========= Banner 等級色 ========= */

.banner{
  border-radius:18px;
  padding:16px;
  text-align:center;
  margin-bottom:15px;
  color:#fff;
}

.banner--gold{
  background:linear-gradient(135deg,#e7c97f,#caa85a);
}

.banner--green{
  background:linear-gradient(135deg,#a8c8b0,#7aa58a);
}

.banner--orange{
  background:linear-gradient(135deg,#f2b47c,#de8f5c);
}

.banner--pink{
  background:linear-gradient(135deg,#e0afb4,#c88f9a);
}

.banner .big{
  font-size:1.5rem;
  margin-bottom:5px;
}

.banner .small strong{
  display:block;
  font-size:1.2rem;
  margin-bottom:3px;
}

/* meter */

.meter{
  height:14px;
  background:#eee;
  border-radius:999px;
  overflow:hidden;
  margin-bottom:10px;
}

.meter div{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--blue),var(--pink));
  transition:width .4s ease;
}

.feedback{
  background:#f9f9f9;
  padding:18px;
  border-radius:18px;
  line-height:1.8;
  margin-bottom:10px;
}

#result-box{display:none;}

</style>
</head>

<body>

<div class="container">

<div id="quiz-ui">

<h1>🌙 你是「睡眠模範生」<br>還是「熬夜特種兵」？🎓</h1>

<p class="subtitle">
✨ 3/13 世界睡眠日 ✨<br>
做個簡單的小測驗，檢視一下日常的睡眠狀況吧！
</p>

<div class="note">
請以近 2 週～1 個月「多數日子」為準作答。<br>
每勾選 1 項 +1 分，滿分 10 分。
</div>

<div class="quiz-list">
<label class="quiz-item"><input type="checkbox" class="q-check">規律作息：每天固定時間起床</label>
<label class="quiz-item"><input type="checkbox" class="q-check">睡前1小時不看手機</label>
<label class="quiz-item"><input type="checkbox" class="q-check">下午3點後不攝取咖啡因</label>
<label class="quiz-item"><input type="checkbox" class="q-check">睡前有放鬆儀式</label>
<label class="quiz-item"><input type="checkbox" class="q-check">臥室全暗且舒適</label>
<label class="quiz-item"><input type="checkbox" class="q-check">睡前不依賴酒精</label>
<label class="quiz-item"><input type="checkbox" class="q-check">睡前3小時不吃宵夜</label>
<label class="quiz-item"><input type="checkbox" class="q-check">20分鐘內入睡</label>
<label class="quiz-item"><input type="checkbox" class="q-check">半夜不易醒來</label>
<label class="quiz-item"><input type="checkbox" class="q-check">醒來精神好</label>
</div>

<button class="btn btn-main" onclick="showResults()">查看我的檢測結果</button>

</div>

<div id="result-box">

<div id="banner" class="banner">
<div class="big" id="banner-title"></div>
<div class="small" id="banner-sub"></div>
</div>

<div class="meter"><div id="meter-bar"></div></div>

<div id="score-text"></div>

<div class="feedback" id="feedback-msg"></div>

<button class="btn btn-reset" onclick="resetGame()">重新測試</button>

</div>

</div>

<script>

function showResults(){
const score = document.querySelectorAll('.q-check:checked').length;
const banner = document.getElementById('banner');
const bannerTitle = document.getElementById('banner-title');
const bannerSub = document.getElementById('banner-sub');
const feedback = document.getElementById('feedback-msg');
const meter = document.getElementById('meter-bar');
const scoreText = document.getElementById('score-text');

banner.className="banner";

if(score>=9){
banner.classList.add("banner--gold");
bannerTitle.textContent="🏆🌙✨";
bannerSub.innerHTML="<strong>傳說級模範生</strong>你是睡眠界資優生！";
feedback.innerHTML="恭喜你！作息穩定、睡眠品質優秀。請繼續保持這份好眠能量。";
}
else if(score>=6){
banner.classList.add("banner--green");
bannerTitle.textContent="🌿😴👍";
bannerSub.innerHTML="<strong>穩定優等生</strong>大多數日子都睡得不錯";
feedback.innerHTML="基礎很好！再微調一兩個小習慣，就能更進一步。";
}
else if(score>=3){
banner.classList.add("banner--orange");
bannerTitle.textContent="⚠️🥱";
bannerSub.innerHTML="<strong>熬夜特種兵</strong>疲勞訊號出現";
feedback.innerHTML="可以從提早30分鐘睡覺開始改善。";
}
else{
banner.classList.add("banner--pink");
bannerTitle.textContent="😱🛌";
bannerSub.innerHTML="<strong>睡眠特困戶</strong>睡眠債可能超支";
feedback.innerHTML="請優先建立規律作息，必要時諮詢專業。";
}

meter.style.width=(score*10)+"%";
scoreText.innerHTML="你的分數："+score+" 分（滿分10分）";

document.getElementById("quiz-ui").style.display="none";
document.getElementById("result-box").style.display="block";
}

function resetGame(){
document.querySelectorAll('.q-check').forEach(cb=>cb.checked=false);
document.getElementById("result-box").style.display="none";
document.getElementById("quiz-ui").style.display="block";
}

</script>

</body>
</html>
